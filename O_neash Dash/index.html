<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + React</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=SUSE:wght@400;700&family=Gowun+Dodum&family=Odibee+Sans&family=PT+Sans:ital,wght@0,400;0,700;1,400&family=Inconsolata:wght@400;700&family=IBM+Plex+Mono+KR:wght@400;700&display=swap" rel="stylesheet" />
      <style>
        @font-face {
          font-family: 'KOTRAGothic';
          src: url('/fonts/KOTRA_GOTHIC.otf') format('opentype');
          font-weight: normal;
          font-style: normal;
        }

        #splash-screen {
          position: fixed;
          inset: 0;
          background: #000;
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          transition: opacity 0.5s;
        }
        .splash-dot {
          width: 16px;
          height: 16px;
          background: #fff;
          border-radius: 50%;
          margin: 0 auto;
          animation: oscillate 1s ease-in-out infinite alternate;
        }
        @keyframes oscillate {
          0% { transform: translateX(-32px); }
          100% { transform: translateX(32px); }
        }
      </style>
  </head>

  <body autocorrect="off" autocapitalize="off" spellcheck="false">
    <div id="splash-screen">
      <div class="splash-dot"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
